# /etc/nginx/sites-available/axioma
#
# AXIOMA SCAN — Nginx конфигурация
#
# Повторяет все 11 proxy правил из vite.config.js один в один.
# Браузер шлёт запросы на свой домен → Nginx проксирует к бирже.
# CORS не возникает — браузер общается только с собственным доменом.
#
# Установка:
#   sudo ln -s /etc/nginx/sites-available/axioma /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# После получения SSL (certbot добавит 443 блок автоматически):
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ── Статика фронтенда (React dist/) ───────────────────────────────────────
    root /var/www/axioma-frontend/dist;
    index index.html;

    # SPA routing — все неизвестные пути отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статических файлов (JS, CSS, шрифты, иконки) — 1 год
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── C# бэкенд (/api/) ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass            http://localhost:5000/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Cookie            $http_cookie;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── Биржи ─────────────────────────────────────────────────────────────────
    #
    # Для каждой биржи:
    #   - OPTIONS preflight → 204 (для coinStatus запросов с API ключами)
    #   - proxy_ssl_server_name on → обязательно для HTTPS бирж
    #   - proxy_buffer_size / proxy_buffers → для больших ответов
    #   - Access-Control-Allow-Headers → заголовки подписи каждой биржи

    # Binance REST (spot)
    location /binance-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-MBX-APIKEY, Authorization";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/binance-api/(.*) /$1 break;
        proxy_pass            https://api.binance.com;
        proxy_set_header      Host              api.binance.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # Binance FAPI (futures)
    location /binance-fapi/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-MBX-APIKEY";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/binance-fapi/(.*) /$1 break;
        proxy_pass            https://fapi.binance.com;
        proxy_set_header      Host              fapi.binance.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # Bybit
    location /bybit-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-BAPI-API-KEY, X-BAPI-SIGN, X-BAPI-TIMESTAMP";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/bybit-api/(.*) /$1 break;
        proxy_pass            https://api.bybit.com;
        proxy_set_header      Host              api.bybit.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # OKX
    location /okx-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, OK-ACCESS-KEY, OK-ACCESS-SIGN, OK-ACCESS-TIMESTAMP, OK-ACCESS-PASSPHRASE";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/okx-api/(.*) /$1 break;
        proxy_pass            https://www.okx.com;
        proxy_set_header      Host              www.okx.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # Gate.io
    location /gate-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, KEY, SIGN, Timestamp";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/gate-api/(.*) /$1 break;
        proxy_pass            https://api.gateio.ws;
        proxy_set_header      Host              api.gateio.ws;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        # Gate tickers ALL возвращает ~500KB — увеличенные буферы и таймаут
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     32k;
        proxy_buffers         8 64k;
        proxy_busy_buffers_size 128k;
    }

    # KuCoin Futures
    location /kucoin-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, KC-API-KEY, KC-API-SIGN, KC-API-TIMESTAMP, KC-API-PASSPHRASE";
