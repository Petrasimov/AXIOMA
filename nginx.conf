        rewrite               ^/kucoin-api/(.*) /$1 break;
        proxy_pass            https://api-futures.kucoin.com;
        proxy_set_header      Host              api-futures.kucoin.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # KuCoin Spot
    location /kucoin-spot-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, KC-API-KEY, KC-API-SIGN, KC-API-TIMESTAMP, KC-API-PASSPHRASE";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/kucoin-spot-api/(.*) /$1 break;
        proxy_pass            https://api.kucoin.com;
        proxy_set_header      Host              api.kucoin.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # MEXC Futures
    location /mexc-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, ApiKey, Request-Time, Signature";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/mexc-api/(.*) /$1 break;
        proxy_pass            https://contract.mexc.com;
        proxy_set_header      Host              contract.mexc.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # MEXC Spot
    location /mexc-spot-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-MEXC-APIKEY";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/mexc-spot-api/(.*) /$1 break;
        proxy_pass            https://api.mexc.com;
        proxy_set_header      Host              api.mexc.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # BingX
    location /bingx-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-BX-APIKEY";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/bingx-api/(.*) /$1 break;
        proxy_pass            https://open-api.bingx.com;
        proxy_set_header      Host              open-api.bingx.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # Bitget
    location /bitget-api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, ACCESS-KEY, ACCESS-SIGN, ACCESS-TIMESTAMP, ACCESS-PASSPHRASE";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }
        rewrite               ^/bitget-api/(.*) /$1 break;
        proxy_pass            https://api.bitget.com;
        proxy_set_header      Host              api.bitget.com;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout    15s;
        proxy_connect_timeout 10s;
        proxy_buffer_size     16k;
        proxy_buffers         4 32k;
    }

    # ── Gzip сжатие ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}

# ══════════════════════════════════════════════════════════════════════════════
# HTTPS блок — certbot добавит автоматически после:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ══════════════════════════════════════════════════════════════════════════════